<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sprachwerkstatt Favicon: vier Tonkurven (Mandarin-Töne) als Markenzeichen -->
  <rect width="64" height="64" rx="14" fill="#131720"/>
  <g fill="none" stroke-width="5" stroke-linecap="round">
    <path d="M10 22 H26" stroke="#2B59C3"/>          <!-- 1. Ton: flach -->
    <path d="M38 26 L54 14" stroke="#C93C2E"/>       <!-- 2. Ton: steigend -->
    <path d="M10 44 L18 52 L26 38" stroke="#2F8F6B"/><!-- 3. Ton: fallend-steigend -->
    <path d="M38 38 L54 52" stroke="#E9B45C"/>       <!-- 4. Ton: fallend -->
  </g>
</svg>
